name: CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Test
        run: go test -v ./...
      
      - name: Test with race detector
        if: runner.os == 'Linux'
        run: go test -race ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee vuln_output.txt || true
          KNOWN="GO-2026-4887|GO-2026-4883"
          if grep -E "^Vulnerability #" vuln_output.txt | grep -vE "$KNOWN" | grep -q .; then
            echo "::error::New vulnerabilities found"
            cat vuln_output.txt
            exit 1
          fi
          echo "Only known unpatched Docker SDK vulns found, passing."

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...